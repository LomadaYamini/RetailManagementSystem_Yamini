version: '3.8'

services:
  mysql-db:
    image: mysql:8.0
    container_name: rms-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: customerproductmgmtdb
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 5

  backend:
    build: .
    container_name: rms-backend
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=mysql-db
    depends_on:
      mysql-db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: rms-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql-data:
